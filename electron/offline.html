<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPERP - Connection Error</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f12;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 420px;
            padding: 2rem;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #f59e0b;
        }
        h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        p { color: #9ca3af; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            margin: 0.25rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary {
            background: #00D46E;
            color: #0f0f12;
        }
        .btn-primary:hover { background: #00b85e; }
        .btn-secondary {
            background: #374151;
            color: #e5e7eb;
        }
        .btn-secondary:hover { background: #4b5563; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Cannot connect to BPERP server</h1>
        <p>The server may be offline or the URL may be incorrect. Check that the BPERP backend is running on your NAS and that the server URL is correct.</p>
        <button class="btn btn-primary" id="retryBtn">Retry</button>
        <button class="btn btn-secondary" id="changeUrlBtn">Change server URL</button>
    </div>
    <script>
        document.getElementById('retryBtn').addEventListener('click', () => {
            if (window.electronAPI?.retryConnection) {
                window.electronAPI.retryConnection();
            } else {
                window.location.reload();
            }
        });
        document.getElementById('changeUrlBtn').addEventListener('click', () => {
            if (window.electronAPI?.reopenSetup) {
                window.electronAPI.reopenSetup();
            }
        });
    </script>
</body>
</html>
