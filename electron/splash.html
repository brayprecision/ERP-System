<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPERP - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }
        
        .splash-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 20px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo-container {
            margin-bottom: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon {
            font-size: 60px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .app-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .app-tagline {
            font-size: 12px;
            color: #8b8b9a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .loader-container {
            margin-top: 30px;
        }
        
        .loader {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .loader-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }
            50% {
                transform: translateX(150%);
            }
            100% {
                transform: translateX(-100%);
            }
        }
        
        .status-text {
            margin-top: 15px;
            font-size: 12px;
            color: #6b6b7a;
        }
        
        .status-text span {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .version {
            margin-top: 20px;
            font-size: 10px;
            color: #4a4a5a;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <div class="logo">
                <span class="logo-icon">⚙</span>
            </div>
        </div>
        
        <h1 class="app-name">BPERP</h1>
        <p class="app-tagline">Manufacturing ERP</p>
        
        <div class="loader-container">
            <div class="loader">
                <div class="loader-bar"></div>
            </div>
            <p class="status-text">
                <span>Starting server...</span>
            </p>
        </div>
        
        <p class="version">v1.0.0-beta.1</p>
    </div>
    
    <script>
        // Update status text
        const statusTexts = [
            'Starting server...',
            'Connecting to database...',
            'Loading modules...',
            'Almost ready...'
        ];
        
        let currentStatus = 0;
        const statusEl = document.querySelector('.status-text span');
        
        setInterval(() => {
            currentStatus = (currentStatus + 1) % statusTexts.length;
            statusEl.textContent = statusTexts[currentStatus];
        }, 2000);
    </script>
</body>
</html>
