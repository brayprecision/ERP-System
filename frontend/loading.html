<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPERP Dashboard - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f12 0%, #18181c 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .loading-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            border-radius: 20px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00D46E, #00A859);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 3rem;
            font-weight: 300;
        }
        
        .status {
            font-size: 1rem;
            color: #00D46E;
            margin-bottom: 1.5rem;
            min-height: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .progress-container {
            width: 100%;
            max-width: 400px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 0 auto 3rem;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00D46E, #00A859);
            border-radius: 2px;
            transition: width 0.5s ease;
            width: 0%;
            position: relative;
        }
        
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 1.5s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .version {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #6b7280;
            font-size: 0.8rem;
        }
        
        .error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 1rem;
        }
        
        .retry-btn {
            background: #00D46E;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s ease;
        }
        
        .retry-btn:hover {
            background: #00A859;
        }
        
        /* Hexagon background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(30deg, transparent, transparent 35px, #00D46E 35px, #00D46E 70px),
                repeating-linear-gradient(90deg, transparent, transparent 35px, #00D46E 35px, #00D46E 70px),
                repeating-linear-gradient(150deg, transparent, transparent 35px, #00D46E 35px, #00D46E 70px);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="assets/logo.png" alt="Bray Precision Manufacturing" class="logo" id="logo">
        <h1 class="title">Bray Precision LLC</h1>
        <p class="subtitle">ERP Dashboard v2.0</p>
        <div class="status" id="status">Initializing system...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="errorContainer"></div>
    </div>
    <div class="version">© 2026 Bray Precision LLC</div>

    <script>
        let currentStep = 0;
        let checkAttempts = 0;
        const maxAttempts = 30; // 30 seconds timeout
        
        const steps = [
            { text: "Checking system requirements...", progress: 10 },
            { text: "Verifying Node.js installation...", progress: 20 },
            { text: "Starting BPERP server...", progress: 40 },
            { text: "Loading application modules...", progress: 60 },
            { text: "Initializing dashboard components...", progress: 80 },
            { text: "Connecting to server...", progress: 90 },
            { text: "Opening BPERP Dashboard...", progress: 100 }
        ];
        
        function updateStatus() {
            if (currentStep < steps.length) {
                const step = steps[currentStep];
                document.getElementById('status').textContent = step.text;
                document.getElementById('progressBar').style.width = step.progress + '%';
                currentStep++;
                
                // Faster progress for first few steps, slower for server startup
                const delay = currentStep < 3 ? 800 : (currentStep < 5 ? 2000 : 1000);
                setTimeout(updateStatus, delay);
            } else {
                checkServerReady();
            }
        }
        
        function checkServerReady() {
            fetch('/')
                .then(response => {
                    if (response.ok) {
                        // Server is ready, redirect to main app
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 500);
                    } else {
                        throw new Error('Server not ready');
                    }
                })
                .catch(() => {
                    checkAttempts++;
                    if (checkAttempts < maxAttempts) {
                        setTimeout(checkServerReady, 1000);
                    } else {
                        showError();
                    }
                });
        }
        
        function showError() {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `
                <div class="error">
                    <strong>Connection timeout</strong><br>
                    Unable to connect to BPERP server. The server may not have started properly.
                    <br><br>
                    <button class="retry-btn" onclick="window.location.reload()">Retry</button>
                    <button class="retry-btn" onclick="window.location.href='/'">Try Direct Access</button>
                </div>
            `;
            document.getElementById('status').textContent = "Connection failed";
        }
        
        // Handle logo loading error
        document.getElementById('logo').addEventListener('error', function() {
            this.style.display = 'none';
        });
        
        // Start the loading sequence
        setTimeout(updateStatus, 1000);
        
        // If we're already on the server, redirect immediately
        if (window.location.pathname === '/loading.html') {
            // We're being served by the server, so it's ready
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
    </script>
</body>
</html>
