<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bray Precision LLC - ERP Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f0f12',
                        cardBg: '#18181c',
                        accentGreen: '#00D46E'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Dashboard Styles -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-darkBg text-gray-200 font-[Inter]">
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="sidebar w-64 bg-cardBg border-r border-gray-800 flex flex-col">
            <!-- Brand (customizable via Settings > Shop Branding) -->
            <div class="p-4 border-b border-gray-800 flex items-center gap-3 cursor-pointer hover:bg-gray-800/50 transition-colors" id="shopBrandArea" title="Click to customize branding">
                <img id="shopLogo" src="assets/modern-logo.png" alt="Shop Logo" class="w-12 h-12 object-contain rounded-lg">
                <div class="flex-1 min-w-0">
                    <h1 id="shopName" class="font-bold text-white truncate">Bray Precision</h1>
                    <p id="shopTagline" class="text-xs text-gray-500 truncate">Manufacturing ERP</p>
                </div>
            </div>
            
            <!-- Navigation -->
            <nav class="sidebar-nav flex-1 px-4 py-4 space-y-2 overflow-y-auto">
                
                <!-- Dashboard -->
                <div data-permission-category="dashboard">
                    <button class="sidebar-item w-full flex items-center gap-3 py-3 px-4 rounded-lg text-gray-300 hover:bg-gray-700 transition-colors" data-route="dashboard">
                        <i class="fa-solid fa-gauge-high w-6 text-accentGreen"></i>
                        <span class="text-sm font-medium">Dashboard</span>
                    </button>
                </div>
                
                <!-- Work In Progress (Standalone Button) -->
                <div data-permission-category="workcenter">
                    <button class="sidebar-item w-full flex items-center gap-3 py-3 px-4 rounded-lg text-gray-300 hover:bg-gray-700 transition-colors" data-route="workcenter-wip">
                        <i class="fa-solid fa-clipboard-list w-6 text-yellow-400"></i>
                        <span class="text-sm font-medium">Work In Progress</span>
                    </button>
                </div>
                
                <!-- Workcenter Dropdown (Workflow Steps) -->
                <div class="sidebar-dropdown" data-permission-category="workcenter">
                    <button class="sidebar-dropdown-trigger w-full flex items-center justify-between py-3 px-4 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors" data-dropdown="workcenter">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-industry w-6 text-orange-400"></i>
                            <span class="text-sm font-medium">Workcenter</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform dropdown-chevron"></i>
                    </button>
                    <div class="sidebar-dropdown-menu hidden mt-1 ml-4 border-l-2 border-gray-700 pl-4 space-y-1" data-dropdown-menu="workcenter">
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-programming">
                            <i class="fa-solid fa-code text-pink-400"></i>
                            <span>Programming</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-ordering">
                            <i class="fa-solid fa-shopping-cart text-blue-400"></i>
                            <span>Ordering</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-processing">
                            <i class="fa-solid fa-cut text-yellow-400"></i>
                            <span>Material Processing</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-machining">
                            <i class="fa-solid fa-cogs text-purple-400"></i>
                            <span>Machining</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-postprocessing">
                            <i class="fa-solid fa-industry text-orange-400"></i>
                            <span>Post Processing</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-inspection">
                            <i class="fa-solid fa-search-plus text-cyan-400"></i>
                            <span>Inspection</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-shipping">
                            <i class="fa-solid fa-truck text-green-400"></i>
                            <span>Shipping + Receiving</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-completed">
                            <i class="fa-solid fa-check-circle text-emerald-400"></i>
                            <span>Completed Work</span>
                        </button>
                    </div>
                </div>
                
                <!-- Inventory Dropdown -->
                <div class="sidebar-dropdown" data-permission-category="inventory">
                    <button class="sidebar-dropdown-trigger w-full flex items-center justify-between py-3 px-4 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors" data-dropdown="inventory">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-box w-6 text-blue-400"></i>
                            <span class="text-sm font-medium">Inventory</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform dropdown-chevron"></i>
                    </button>
                    <div class="sidebar-dropdown-menu hidden mt-1 ml-4 border-l-2 border-gray-700 pl-4 space-y-1" data-dropdown-menu="inventory">
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-kanban">
                            <i class="fa-solid fa-columns text-amber-400"></i>
                            <span>Kanban</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-products">
                            <i class="fa-solid fa-cube text-emerald-400"></i>
                            <span>Products</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-parts">
                            <i class="fa-solid fa-puzzle-piece text-teal-400"></i>
                            <span>Parts</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-materials">
                            <i class="fa-solid fa-cubes text-blue-400"></i>
                            <span>Materials</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-tooling">
                            <i class="fa-solid fa-tools text-yellow-400"></i>
                            <span>Tooling</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="inventory-misc">
                            <i class="fa-solid fa-box-open text-purple-400"></i>
                            <span>Miscellaneous</span>
                        </button>
                    </div>
                </div>
                
                <!-- Sales Dropdown -->
                <div class="sidebar-dropdown" data-permission-category="sales">
                    <button class="sidebar-dropdown-trigger w-full flex items-center justify-between py-3 px-4 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors" data-dropdown="sales">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-file-invoice-dollar w-6 text-green-400"></i>
                            <span class="text-sm font-medium">Sales</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform dropdown-chevron"></i>
                    </button>
                    <div class="sidebar-dropdown-menu hidden mt-1 ml-4 border-l-2 border-gray-700 pl-4 space-y-1" data-dropdown-menu="sales">
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="sales-customers">
                            <i class="fa-solid fa-building text-blue-400"></i>
                            <span>Customers</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="sales-quotes">
                            <i class="fa-solid fa-file-invoice text-cyan-400"></i>
                            <span>Quotes</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="sales-archived-quotes">
                            <i class="fa-solid fa-file-circle-xmark text-gray-400"></i>
                            <span>Archived Quotes</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="sales-archived-work">
                            <i class="fa-solid fa-archive text-gray-400"></i>
                            <span>Archived Work</span>
                        </button>
                    </div>
                </div>
                
                <!-- Tasks Dropdown -->
                <div class="sidebar-dropdown" data-permission-category="tasks">
                    <button class="sidebar-dropdown-trigger w-full flex items-center justify-between py-3 px-4 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors" data-dropdown="tasks">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-clipboard-check w-6 text-purple-400"></i>
                            <span class="text-sm font-medium">Tasks</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform dropdown-chevron"></i>
                    </button>
                    <div class="sidebar-dropdown-menu hidden mt-1 ml-4 border-l-2 border-gray-700 pl-4 space-y-1" data-dropdown-menu="tasks">
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-all">
                            <i class="fa-solid fa-tasks text-purple-400"></i>
                            <span>All Tasks</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="tasks-maintenance">
                            <i class="fa-solid fa-industry text-purple-400"></i>
                            <span>Machines</span>
                        </button>
                    </div>
                </div>
                
                <!-- Settings Dropdown -->
                <div class="sidebar-dropdown" data-permission-category="settings">
                    <button class="sidebar-dropdown-trigger w-full flex items-center justify-between py-3 px-4 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors" data-dropdown="settings">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-sliders w-6 text-gray-400"></i>
                            <span class="text-sm font-medium">Settings</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform dropdown-chevron"></i>
                    </button>
                    <div class="sidebar-dropdown-menu hidden mt-1 ml-4 border-l-2 border-gray-700 pl-4 space-y-1" data-dropdown-menu="settings">
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-branding">
                            <i class="fa-solid fa-store text-orange-400"></i>
                            <span>Shop Branding</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-users">
                            <i class="fa-solid fa-users text-blue-400"></i>
                            <span>Users & Permissions</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-backup">
                            <i class="fa-solid fa-database text-green-400"></i>
                            <span>Backup & Restore</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-server" id="settingsServerNav" style="display: none;">
                            <i class="fa-solid fa-server text-cyan-400"></i>
                            <span>Server Connection</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-about" id="settingsAboutNav" style="display: none;">
                            <i class="fa-solid fa-circle-info text-sky-400"></i>
                            <span>About this app</span>
                        </button>
                        <button class="w-full flex items-center gap-3 py-2 px-3 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded transition-colors" data-route="settings-preferences">
                            <i class="fa-solid fa-cog text-gray-400"></i>
                            <span>Preferences</span>
                        </button>
                    </div>
                </div>
                
            </nav>
            
            <!-- User Info -->
            <div class="p-4 border-t border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center" style="background: var(--color-accent-primary);">
                        <i class="fa-solid fa-user text-sm text-white"></i>
                    </div>
                    <div class="flex-1">
                        <p id="currentUserName" class="text-sm font-medium text-white">Guest</p>
                        <p id="currentUserRole" class="text-xs text-gray-500">Not logged in</p>
                    </div>
                    <button id="logoutBtn" class="text-gray-400 hover:text-red-400 transition-colors" title="Logout">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content flex-1 overflow-hidden flex flex-col">
            <!-- Header -->
            <header class="header h-16 bg-cardBg border-b border-gray-800 px-6 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <h2 id="pageTitle" class="text-lg font-semibold text-white">Dashboard</h2>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Offline Indicator -->
                    <div id="offlineIndicator" class="hidden flex items-center gap-2 px-3 py-1 bg-yellow-600 rounded-full text-sm">
                        <i class="fa-solid fa-wifi-slash"></i>
                        <span>Offline</span>
                    </div>
                    
                    <!-- Search -->
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer hover:text-gray-300" 
                            onclick="BPERP.search?.performGlobalSearch(document.getElementById('globalSearch').value)"></i>
                        <input type="text" id="globalSearch" placeholder="Search all tables..." 
                            class="bg-gray-800 text-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm border border-gray-700 focus:border-accentGreen focus:outline-none w-64 transition-all">
                    </div>
                    
                    <!-- Notifications -->
                    <button class="relative text-gray-400 hover:text-white">
                        <i class="fa-solid fa-bell text-lg"></i>
                        <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-xs flex items-center justify-center">3</span>
                    </button>
                    
                    <!-- Quick Add -->
                    <button id="quickAddBtn" class="bg-accentGreen text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-600 transition-colors">
                        <i class="fa-solid fa-plus mr-2"></i>Quick Add
                    </button>
                </div>
            </header>
            
            <!-- Dashboard Content -->
            <div class="flex-1 overflow-auto p-6">
                <div id="dashboardContent" class="grid grid-cols-3 gap-6">
                    <!-- Content loaded dynamically by JavaScript modules -->
                    <div class="col-span-3 flex items-center justify-center py-20">
                        <div class="text-center">
                            <i class="fa-solid fa-spinner fa-spin text-4xl text-accentGreen mb-4"></i>
                            <p class="text-gray-400">Loading BPERP Dashboard...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Theme Preferences Modal -->
    <div id="themeModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                    <i class="fa-solid fa-palette" style="color: var(--color-accent-primary);"></i>
                    Appearance Settings
                </h3>
                <button id="closeThemeModal" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            <div class="modal-body p-6">
                <h4 class="text-sm font-semibold uppercase tracking-wider mb-4" style="color: var(--color-accent-primary);">Color Theme</h4>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <!-- Automation Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="automation">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#ff6b35]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#00d4ff]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#00ff88]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Automation</h5>
                        <p class="text-xs text-gray-400">Orange & Cyan - CNC Control inspired</p>
                    </button>
                    
                    <!-- Industrial Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="industrial">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#00ff66]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#88ff00]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#00ffcc]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Industrial</h5>
                        <p class="text-xs text-gray-400">Green Matrix - Factory floor classic</p>
                    </button>
                    
                    <!-- Cyber Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="cyber">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#00a8ff]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ff00aa]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#00ffff]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Cyber</h5>
                        <p class="text-xs text-gray-400">Blue & Magenta - Futuristic tech</p>
                    </button>
                    
                    <!-- Classic Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="classic">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#00D46E]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#3b82f6]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#8b5cf6]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Classic</h5>
                        <p class="text-xs text-gray-400">Green & Blue - Original BPERP</p>
                    </button>
                    
                    <!-- Crimson Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="crimson">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#ff2d55]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ff8a00]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ff006e]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Crimson</h5>
                        <p class="text-xs text-gray-400">Red & Orange - Bold and intense</p>
                    </button>
                    
                    <!-- Ultraviolet Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="ultraviolet">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#a855f7]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#06b6d4]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ec4899]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Ultraviolet</h5>
                        <p class="text-xs text-gray-400">Purple & Cyan - Neon nights</p>
                    </button>
                    
                    <!-- Amber Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="amber">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#ffaa00]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ff6600]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#ffdd00]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Amber</h5>
                        <p class="text-xs text-gray-400">Warm Gold - Retro terminal</p>
                    </button>
                    
                    <!-- Midnight Theme -->
                    <button class="theme-option p-4 rounded-lg border-2 text-left transition-all" data-theme="midnight">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="flex gap-1">
                                <span class="w-4 h-4 rounded-full bg-[#3b82f6]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#0ea5e9]"></span>
                                <span class="w-4 h-4 rounded-full bg-[#818cf8]"></span>
                            </div>
                        </div>
                        <h5 class="text-white font-medium">Midnight</h5>
                        <p class="text-xs text-gray-400">Deep Blue - Late night focus</p>
                    </button>
                </div>
                
                <h4 class="text-sm font-semibold uppercase tracking-wider mb-4 mt-8" style="color: var(--color-accent-primary);">Display Options</h4>
                <div class="space-y-4">
                    <label class="flex items-center justify-between p-3 rounded-lg bg-gray-800/50">
                        <span class="text-gray-300">Hexagon background pattern</span>
                        <input type="checkbox" id="pref-grid" class="w-5 h-5 accent-orange-500" checked>
                    </label>
                    <label class="flex items-center justify-between p-3 rounded-lg bg-gray-800/50">
                        <span class="text-gray-300">Card glow effects</span>
                        <input type="checkbox" id="pref-glow" class="w-5 h-5 accent-orange-500" checked>
                    </label>
                    <label class="flex items-center justify-between p-3 rounded-lg bg-gray-800/50">
                        <span class="text-gray-300">Animations</span>
                        <input type="checkbox" id="pref-animations" class="w-5 h-5 accent-orange-500" checked>
                    </label>
                    <div class="p-3 rounded-lg bg-gray-800/50">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-gray-300">Panel Transparency</span>
                            <span id="transparency-value" class="text-sm font-mono" style="color: var(--color-accent-primary);">0%</span>
                        </div>
                        <input type="range" id="pref-transparency" min="0" max="50" value="50" class="transparency-slider w-full">
                        <div class="flex justify-between text-xs text-gray-500 mt-1">
                            <span>Glass</span>
                            <span>Solid</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer p-4 border-t border-gray-700 flex justify-end gap-3">
                <button id="resetTheme" class="btn btn-secondary">Reset to Default</button>
                <button id="saveTheme" class="btn btn-primary">Save Preferences</button>
            </div>
        </div>
    </div>
    
    <!-- Quick Add Dropdown with Backdrop -->
    <div id="quickAddBackdrop" class="fixed inset-0 bg-black/50 z-40 backdrop-blur-sm" style="display: none; pointer-events: auto;"></div>
    <div id="quickAddDropdown" class="fixed z-50 rounded-xl w-72" style="display: none; pointer-events: auto; background: var(--gradient-card); border: 1px solid var(--color-accent-primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <!-- Header -->
        <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
            <h3 class="text-white font-medium"><i class="fa-solid fa-plus text-accentGreen mr-2"></i>Quick Add</h3>
            <button id="quickAddCloseBtn" class="text-gray-400 hover:text-white">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <!-- Options -->
        <div class="py-2">
            <button class="w-full px-4 py-3 text-left text-gray-300 hover:bg-gray-800 flex items-center gap-3 transition-colors" data-action="add-inventory" data-type="materials">
                <i class="fa-solid fa-cube text-blue-400 w-5 text-lg"></i>
                <span>Add Material</span>
            </button>
            <button class="w-full px-4 py-3 text-left text-gray-300 hover:bg-gray-800 flex items-center gap-3 transition-colors" data-action="add-customer">
                <i class="fa-solid fa-building text-green-400 w-5 text-lg"></i>
                <span>Add Customer</span>
            </button>
            <button class="w-full px-4 py-3 text-left text-gray-300 hover:bg-gray-800 flex items-center gap-3 transition-colors" data-action="add-quote">
                <i class="fa-solid fa-file-invoice text-cyan-400 w-5 text-lg"></i>
                <span>Add Quote</span>
            </button>
            <button class="w-full px-4 py-3 text-left text-gray-300 hover:bg-gray-800 flex items-center gap-3 transition-colors" data-action="add-wo">
                <i class="fa-solid fa-clipboard-list text-yellow-400 w-5 text-lg"></i>
                <span>Add Work Order</span>
            </button>
            <div class="border-t border-gray-700 my-2"></div>
            <button class="w-full px-4 py-3 text-left text-gray-300 hover:bg-gray-800 flex items-center gap-3 transition-colors" data-action="create-misc-task">
                <i class="fa-solid fa-tasks text-purple-400 w-5 text-lg"></i>
                <span>Add Task</span>
            </button>
        </div>
    </div>
    
    <!-- Application Entry Point -->
    <script type="module" src="js/app.js"></script>
    
    <!-- Fallback for module loading errors -->
    <script>
        // Check if modules loaded after 5 seconds
        setTimeout(function() {
            if (!window.BPERP || !window.BPERP.isInitialized) {
                var content = document.getElementById('dashboardContent');
                if (content && content.querySelector('.fa-spinner')) {
                    content.innerHTML = '<div class="col-span-3 text-center py-20">' +
                        '<i class="fa-solid fa-exclamation-triangle text-4xl text-yellow-500 mb-4"></i>' +
                        '<h3 class="text-lg font-medium text-white mb-2">Module Loading Issue</h3>' +
                        '<p class="text-gray-400 mb-4">The application modules could not be loaded.</p>' +
                        '<div class="bg-gray-800 p-4 rounded-lg max-w-md mx-auto text-left">' +
                        '<p class="text-sm text-gray-300 mb-2"><strong>Possible causes:</strong></p>' +
                        '<ul class="text-sm text-gray-400 list-disc list-inside space-y-1">' +
                        '<li>Opening file directly (file:// protocol not supported)</li>' +
                        '<li>JavaScript modules require HTTP/HTTPS server</li>' +
                        '<li>Network or browser security restrictions</li>' +
                        '</ul>' +
                        '<p class="text-sm text-gray-300 mt-4"><strong>Solution:</strong></p>' +
                        '<p class="text-sm text-gray-400">Run a local server:</p>' +
                        '<code class="block bg-gray-900 p-2 rounded mt-2 text-green-400 text-xs">npx serve frontend</code>' +
                        '<p class="text-sm text-gray-400 mt-2">Or launch the Electron desktop app with: <code>npm start</code></p>' +
                        '</div>' +
                        '<button onclick="window.location.reload()" class="mt-4 bg-accentGreen text-white px-4 py-2 rounded hover:bg-green-700">' +
                        'Reload Dashboard' +
                        '</button>' +
                        '</div>';
                }
            }
        }, 5000);
    </script>
    
    <!-- Quick Add Handler (inline for simplicity) -->
    <script>
        document.getElementById('quickAddBtn').addEventListener('click', function(e) {
            const dropdown = document.getElementById('quickAddDropdown');
            const rect = this.getBoundingClientRect();
            
            dropdown.style.top = (rect.bottom + 8) + 'px';
            dropdown.style.left = (rect.right - dropdown.offsetWidth) + 'px';
            dropdown.classList.toggle('hidden');
            
            e.stopPropagation();
        });
        
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('quickAddDropdown');
            if (!dropdown.contains(e.target) && e.target !== document.getElementById('quickAddBtn')) {
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
